<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diabetes Prediction</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .container { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        h1 { text-align: center; color: #333; margin-bottom: 2rem; font-size: 2rem; }
        .form-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; color: #555; font-weight: 500; }
        input, select { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; transition: border-color 0.3s; }
        input:focus, select:focus { outline: none; border-color: #667eea; }
        button { width: 100%; padding: 14px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: 600; cursor: pointer; transition: transform 0.2s; }
        button:hover { transform: translateY(-2px); }
        .result { margin-top: 2rem; padding: 1.5rem; border-radius: 10px; text-align: center; font-size: 1.2rem; font-weight: bold; }
        .no-diabetes { background: #d4edda; color: #155724; }
        .diabetes { background: #f8d7da; color: #721c24; }
        .loading { text-align: center; color: #666; font-style: italic; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🩺 Diabetes Predictor</h1>
        <form id="predictForm">
            
            <div class="form-group">
                <label for="age">Age:</label>
                <input type="number" id="age" name="age" min="1" max="120" required>
            </div>
            
            <div class="form-group">
                <label for="hypertension">Hypertension (0=No, 1=Yes):</label>
                <input type="number" id="hypertension" name="hypertension" min="0" max="1" required>
            </div>
            
            <div class="form-group">
                <label for="heart_disease">Heart Disease (0=No, 1=Yes):</label>
                <input type="number" id="heart_disease" name="heart_disease" min="0" max="1" required>
            </div>
            
            <div class="form-group">
                <label for="bmi">BMI:</label>
                <input type="number" id="bmi" name="bmi" step="0.01" required>
            </div>
            
            <div class="form-group">
                <label for="HbA1c_level">HbA1c Level:</label>
                <input type="number" id="HbA1c_level" name="HbA1c_level" step="0.01" required>
            </div>
            
            <div class="form-group">
                <label for="blood_glucose_level">Blood Glucose Level:</label>
                <input type="number" id="blood_glucose_level" name="blood_glucose_level" required>
            </div>
            
            
            <div class="form-group">
                <label for="gender">Gender:</label>
                <select id="gender" name="gender" required>
                    <option value="">Select Gender</option>
                    <option value="0">Male</option>
                    <option value="1">Female</option>
                    <option value="2">Other</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="smoking_history">Smoking History:</label>
                <select id="smoking_history" name="smoking_history" required>
                    <option value="">Select Smoking History</option>
                    <option value="0">No Info</option>
                    <option value="1">Current</option>
                    <option value="2">Former</option>
                    <option value="3">Ever</option>
                    <option value="4">Never</option>
                    <option value="5">Not Current</option>
                </select>
            </div>
            
            <button type="submit">Predict Diabetes Risk</button>
        </form>
        
        <div id="result" class="result" style="display: none;"></div>
    </div>

    <script>
        document.getElementById('predictForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const formData = new FormData(this);
            const data = Object.fromEntries(formData);
            
            // Converted to 13-element array in the exact order the model expects:
            // [age, hypertension, heart_disease, bmi, HbA1c_level, blood_glucose_level,
            //  gender_Male, gender_Other,
            //  smoking_history_current, smoking_history_ever, smoking_history_former,
            //  smoking_history_never, smoking_history_not current]

            // Mapped gender to two one-hot columns (gender_Male, gender_Other). Female -> both 0.
            const genderVal = data.gender;
            let gender_Male = 0, gender_Other = 0;
            if (genderVal === '0') { // Male
                gender_Male = 1;
            } else if (genderVal === '2') { // Other
                gender_Other = 1;
            }

            // Map smoking history to 5 one-hot columns in the order used by the model
            // Values: 0=No Info (all zeros), 1=Current, 2=Former, 3=Ever, 4=Never, 5=Not Current
            const smokingVal = data.smoking_history;
            let s_current = 0, s_ever = 0, s_former = 0, s_never = 0, s_not_current = 0;
            switch (smokingVal) {
                case '1': s_current = 1; break;
                case '3': s_ever = 1; break;
                case '2': s_former = 1; break;
                case '4': s_never = 1; break;
                case '5': s_not_current = 1; break;
                default: /* No Info or empty -> all zeros */ break;
            }

            const features = [
                parseFloat(data.age),
                parseFloat(data.hypertension),
                parseFloat(data.heart_disease),
                parseFloat(data.bmi),
                parseFloat(data.HbA1c_level),
                parseFloat(data.blood_glucose_level),
                gender_Male,
                gender_Other,
                s_current,
                s_ever,
                s_former,
                s_never,
                s_not_current
            ];
            
            document.getElementById('result').innerHTML = '<div class="loading">Analyzing...</div>';
            document.getElementById('result').style.display = 'block';
            
            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ data: features })
                });
                
                const result = await response.json();
                const prediction = result.prediction;
                
                if (prediction === 0) {
                    document.getElementById('result').innerHTML = '✅ <strong>No Diabetes Detected</strong><br>You are currently at low risk.';
                    document.getElementById('result').className = 'result no-diabetes';
                } else {
                    document.getElementById('result').innerHTML = '⚠️ <strong>Diabetes Risk Detected</strong><br>Please consult a healthcare professional.';
                    document.getElementById('result').className = 'result diabetes';
                }
            } catch (error) {
                document.getElementById('result').innerHTML = '❌ Prediction error. Please try again.';
                document.getElementById('result').className = 'result diabetes';
            }
        });
    </script>
</body>
</html>
